site_name: Mesh Sorocaba
site_url: https://www.meshsorocaba.org
repo_url: https://github.com/MeshSorocaba/meshsorocaba.github.io/
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  locale: pt_br
  icon:
    logo: fontawesome/solid/industry
  favicon: img/favicon.png
  features:
      - navigation.indexes
      - navigation.tabs
      - navigation.path
      - navigation.tabs.sticky
      - navigation.footer
      - toc.integrate
      - content.action.view
      - content.action.edit
  palette:
      scheme: slate
      primary: indigo
      accent: cyan

nav:
  - Início: index.md
  - O que são Redes Mesh: redes-mesh.md
  - Equipamento Recomendado: equipamento.md
  - Configuração: 
    - Guia de Configuração: configuracao/index.md
    - Modo Companion: configuracao/companions.md
    - Modo Repetidor: 
      - Configurando um Repetidor: configuracao/repeaters.md
      - Temporização e Deduplicação: configuracao/temporizacao-e-deduplicacao.md
    - Modo Observador: configuracao/observers.md
  - Ferramentas:
    - ferramentas/index.md
    - Gerador de Nomes para Repetidores: ferramentas/nomes-repetidores.md
    - Calculadora de Bateria e Placa Solar: ferramentas/calculadora-bateria-e-placa-solar.md
  - Referência:
    - Temporização e Deduplicação: referencia/temporizacao-e-deduplicacao.md
  - FAQ: perguntas-frequentes.md
  - Mapa: https://map.meshcore.io/?zoom=7&lat=-22.1976&lon=-47.1863
  - Blog:
    - blog/index.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - attr_list
  - pymdownx.blocks.caption
  - md_in_html

extra_css:
  - https://unpkg.com/leaflet@1.9.4/dist/leaflet.css
  - styles/extra.css

extra_javascript:
  - js/repeater-name-generator.js
  - https://unpkg.com/leaflet@1.9.4/dist/leaflet.js
  - js/solar-calculator.js
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - blog:
      authors_file: "{blog}/.authors.yml"
  - social:
      cards_layout: default
      cards_layout_options:
        background_color: "#2C2D3C"
        color: "#70a2e4"
  - git-revision-date-localized:
      enable_creation_date: false
      type: date
  - git-committers:
      repository: MeshSorocaba/meshsorocaba.github.io
      branch: main



extra:
  social:
    - icon: fontawesome/brands/telegram
      link: https://t.me/meshsorocaba
    - icon: fontawesome/brands/github
      link: https://github.com/MeshSorocaba
