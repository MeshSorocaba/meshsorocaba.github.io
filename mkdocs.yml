site_name: Mesh Sorocaba
site_url: https://www.meshsorocaba.org
repo_url: https://github.com/MeshSorocaba/meshsorocaba.github.io/
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  locale: pt_br
  icon:
    logo: fontawesome/solid/industry
  favicon: img/favicon.png
  features:
      - navigation.tabs
      - navigation.path
      - navigation.tabs.sticky
      - toc.integrate
      - content.action.view
      - content.action.edit
  palette:
      scheme: slate
      primary: indigo
      accent: cyan

nav:
  - Início: index.md
  - O que é uma rede mesh?: redes-mesh.md
  - Equipamento: equipamento.md
  - Configuração: 
    - Escolhendo o Modo do Dispositivo: configuracao/escolhendo-o-modo-do-dispositivo.md
    - Modo Companion: configuracao/companions.md
    - Modo Repetidor: 
      - Configurando uma repetidora: configuracao/repeaters.md
      - Temporização e Deduplicação: configuracao/temporizacao-e-deduplicacao.md
    - Modo Observador: configuracao/observers.md
  - Ferramentas:
    - Nomes de Repetidoras: ferramentas/nomes-repetidoras.md
  - Perguntas Frequentes: perguntas-frequentes.md
  - Blog:
    - blog/index.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - attr_list
  - pymdownx.blocks.caption
  - md_in_html

extra_css:
  - styles/extra.css

extra_javascript:
  - js/repeater-name-generator.js
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - blog:
      authors_file: "{blog}/.authors.yml"
  - social:
      cards_layout: default
      cards_layout_options:
        background_color: "#2C2D3C"
        color: "#70a2e4"
  - git-revision-date-localized:
      enable_creation_date: false
      type: date
  - git-committers:
      repository: MeshSorocaba/meshsorocaba.github.io
      branch: main



extra:
  social:
    - icon: fontawesome/brands/telegram
      link: https://t.me/meshsorocaba
    - icon: fontawesome/brands/github
      link: https://github.com/MeshSorocaba
